name: Copy Optimizer

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1' # Weekly Monday 06:30 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run copy optimizer
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_HTTP_REFERER: ${{ vars.AI_HTTP_REFERER }}
          AI_APP_NAME: cpdpath-copy-optimizer
        run: ruby scripts/copy_optimizer.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/copy-optimizer
          commit-message: "chore(copy): AI copy optimization pass"
          title: "chore(copy): AI copy optimization suggestions"
          body: |
            Automated copy optimization pass for key homepage sections.

            Generated by `.github/workflows/copy-optimizer.yml` and `scripts/copy_optimizer.rb`.
            Please review for brand voice and factual accuracy before merging.
          labels: |
            copy
            automation
          add-paths: |
            index.html
            copy/last-run.json
          delete-branch: true
